// Version of proto
syntax = "proto3";

// Split service request and response files into different files
option java_multiple_files = true;
// Put all generated code into a single package
option java_package = "billing";

service BillingService {
  rpc CreateBillingAccount (BillingRequest) returns (BillingResponse);
}

message BillingRequest {
  string patientId = 1;
  string name      = 2;
  string email     = 3;
}

message BillingResponse {
  string accountId = 1;
  string status    = 2;
}
